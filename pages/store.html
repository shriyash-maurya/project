<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - GrowLoop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="font-poppins bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Student Store</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl p-6 shadow-md">
                <h3 class="font-semibold text-lg mb-2">Advanced React Course</h3>
                <p class="text-gray-600 text-sm mb-4">Master React development</p>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-bold text-purple-600">$49</span>
                    <button class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors duration-200">
                        Buy Now
                    </button>
                </div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-md">
                <h3 class="font-semibold text-lg mb-2">Python for Beginners</h3>
                <p class="text-gray-600 text-sm mb-4">Start your programming journey</p>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-bold text-purple-600">$39</span>
                    <button class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors duration-200">
                        Buy Now
                    </button>
                </div>
            </div>
        </div>
        <div class="mt-8">
            <a href="../index.html" class="text-purple-600 hover:text-purple-700">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
